name: Deploy VitePress to GitHub Pages

on:
  push:
    branches:
      - main # 指定分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 配置镜像源
        run: pnpm config set registry https://registry.npmmirror.com

      # 拉取代码（升级到 v4 版本，保留 persist-credentials 适配组织仓库）
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # 确保 VitePress 的 lastUpdated 功能正常

      # 安装 Node.js
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # 缓存 pnpm 依赖，加速构建

      - name: 安装依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm build

      # 部署到 GitHub Pages
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # 无需手动配置密钥，使用 GitHub 内置令牌（组织仓库需开启 Actions 读写权限）
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 源目录
          publish_dir: ./.vitepress/dist
          # 部署到 gh-pages 分支（GitHub Pages 标准分支）
          publish_branch: gh-pages
          # 清除 gh-pages 分支旧文件
          force_orphan: true
          # 指定 git 仓库配置
          git_config: |
            init.defaultBranch = main
